services:
  db:
    image: postgres:15-alpine
    restart: unless-stopped
    volumes:
      - postgres-data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: savibud_user
      POSTGRES_PASSWORD_FILE: /run/secrets/db_password
      POSTGRES_DB: savibud
    secrets:
      - db_password
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U savibud_user -d savibud"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build:
      context: .
      dockerfile: savibud-api/Dockerfile
      target: api
    restart: unless-stopped
    command: sh -c "alembic upgrade head && python savibud-api/main.py"
    depends_on:
      db:
        condition: service_healthy
    environment:
      DB_HOST: db
      DB_USER: savibud_user
      DB_NAME: savibud
      POWENS_CLIENT_ID: 89499712
      ALGORITHM: HS256
      ADAPTER: postgres
      POWENS_REDIRECT_URI: "http://localhost:4000/powens/callback"
      POWENS_DOMAIN: savibud-sandbox.biapi.pro
    volumes:
      - ./savibud-api:/app
      - uploads_data:/app/static/uploads

  front:
    build:
      context: .
      dockerfile: savibud-front/Dockerfile
    restart: unless-stopped
    depends_on:
      - api
    ports:
      - "5175:80"

  worker:
    build:
      context: .
      dockerfile: savibud-api/Dockerfile
      target: scheduler
    command: python -m scheduler.main
    env_file: savibud-api/.env
    environment:
      DB_HOST: db
      DB_USER: savibud_user
      DB_NAME: savibud
    depends_on: [db]
    # Ensure only 1 instance runs
    deploy:
      replicas: 1

volumes:
  postgres-data:
    name: savibud-postgres-data
  uploads_data:
    name: savibud-uploads-data

secrets:
  db_password:
    file: savibud-api/.secrets/db_password.txt
  powens_client_secret:
    file: savibud-api/.secrets/powens_client_secret.txt
  secret_key:
    file: savibud-api/.secrets/secret_key.txt