name: Python package

on:
    push:
      branches:
        - main
    pull_request:
      types: [opened, synchronize, reopened]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Cache Python dependencies
        uses: actions/cache@v3
        with:
          path: ~/.cache/uv
          key: ${{ runner.os }}-uv-${{ hashFiles('savibud-api/uv.lock') }}
          restore-keys: |
            ${{ runner.os }}-uv-
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install uv
        run: |
          python -m pip install --upgrade pip
          pip install uv
      - name: Install dependencies
        working-directory: ./savibud-api
        run: |
          uv sync --frozen
      - name: Run tests and generate coverage
        working-directory: ./savibud-api
        run: |
          uv run pytest --cov=. --cov-report=xml --maxfail=1 --exitfirst
      - name: Cache coverage report
        uses: actions/cache@v3
        with:
          path: savibud-api/coverage.xml
          key: ${{ runner.os }}-coverage-${{ github.sha }}
          restore-keys: |
            ${{ runner.os }}-coverage-

  sonarqube:
    name: SonarQube
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Restore coverage report
        uses: actions/cache@v3
        with:
          path: savibud-api/coverage.xml
          key: ${{ runner.os }}-coverage-${{ github.sha }}
          restore-keys: |
            ${{ runner.os }}-coverage-
      - name: SonarQube Scan
        uses: SonarSource/sonarqube-scan-action@v5
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        with:
          args: >
            -Dsonar.python.version=3.11
            -Dsonar.python.coverage.reportPaths=savibud-api/coverage.xml